apiVersion: apps/v1
kind: Deployment
metadata:
  name: producer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: producer
  template:
    metadata:
      labels:
        app: producer
    spec:
      containers:
      - name: producer
        image: kafka-demo-app:latest # User will need to build this
        env:
        - name: APP_MODE
          value: "PRODUCER"
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka:9092"
        - name: KAFKA_TOPIC
          value: "demo-topic"
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: producer
spec:
  selector:
    app: producer
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
  type: ClusterIP
